name: Run Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and dependencies
        run: |
          pip install -e "Python Package/"
          pip install pytest numpy

      - name: Run unit tests
        run: |
          pytest Tests/unit/ -v
